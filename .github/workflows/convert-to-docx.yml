name: Convert Markdown to Word

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'sample.md'
      - '.github/workflows/convert-to-docx.yml'
  workflow_dispatch:

jobs:
  convert:
    name: Convert to Word Document
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Verify Pandoc installation
        run: pandoc --version

      - name: Convert Markdown to Word
        run: |
          pandoc sample.md -o sample.docx \
            --from markdown \
            --to docx \
            --toc \
            --number-sections 

      - name: Upload Word document as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sample-document
          path: sample.docx
          retention-days: 30

      - name: Check for changes
        id: verify
        run: |
          if git diff --quiet sample.docx; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git
        if: steps.verify.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push changes
        if: steps.verify.outputs.changed == 'true'
        run: |
          git add sample.docx
          git commit -m "docs: auto-generate sample.docx from sample.md"
          git push
